# ===============================
# CONFIGURAÇÕES DO POSTGRESQL
# ===============================
spring:
  application:
    name: starage
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/starage_db}
    username: ${DB_USER:starage_user}
    password: ${DB_PASSWORD:starage_password}
    driver-class-name: org.postgresql.Driver

  # ===============================
  # CONFIGURAÇÕES DO JPA / HIBERNATE
  # ===============================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# ===============================
# CONFIGURAÇÃO DO BROKER MQTT
# ===============================
mqtt:
  broker:
    url: tcp://localhost:1883
  client:
    id: starage_backend_local
